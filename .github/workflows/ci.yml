name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install grammar tooling
        run: npm ci

      - name: Verify generated parser is current
        run: |
          npm run generate
          git diff --exit-code -- src/parser.c src/grammar.json src/node-types.json

      - name: Install Python tooling
        run: python -m pip install --upgrade pip build pytest tree-sitter~=0.25

      - name: Build distributions
        run: python -m build

      - name: Install wheel and run tests
        run: |
          python -m pip install dist/*.whl
          pytest tests
